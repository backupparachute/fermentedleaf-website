<!doctype html>
<html lang="en" data-bs-theme="{{ site.theme_defaults.theme }}">
<head>
  {% include head.html %}
</head>
<body>

{%- assign td = site.theme_defaults -%}
<div class="fl-site" id="fl-site" data-theme="{{ td.theme }}" data-palette="{{ td.palette }}" data-accent="{{ td.accent }}">

  {% include announce.html %}

  <div class="fl-container">
    {% include nav.html %}

    {{ content }}

    {% include footer.html %}
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="{{ '/assets/js/theme-toggle.js' | relative_url }}"></script>
<script src="{{ '/assets/js/newsletter.js' | relative_url }}" defer></script>

</body>
</html>
